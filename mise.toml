[tools]
"github:crate-ci/committed" = "latest"
"npm:opencode-ai" = "latest"
bun = "latest"
docker-cli = "latest"
dprint = "latest"
elixir = "1.20.0-rc.4-otp-29"
erlang = "28"
fnox = "latest"
gitleaks = "latest"
lefthook = "latest"
pitchfork = "latest"
"github:vi/websocat" = { version = "latest", bin = "websocat" }

[settings]
npm.bun = true
erlang.compile = false

[hooks]
postinstall = "lefthook install"

[tasks.fmt]
description = "Formats all supported files"
run = "dprint fmt"

[tasks.fmt-check]
description = "Checks formatting and fails on differences"
run = "dprint check"

[tasks.sandbox]
description = "Start a sandbox (optionally run an OpenCode prompt)"
usage = '''
flag "--prompt <prompt>" help="Optional prompt text to run with OpenCode"
flag "--recreate" help="Force full create from template/snapshot source"
flag "--snapshot-id <snapshot-id>" help="Use a specific snapshot ID"
flag "--model <model>" help="OpenCode model override"
flag "--agent <agent>" help="OpenCode agent override"
flag "--wait" help="Wait for app/opencode health checks before returning"
'''
shell = "bash -c"
run = '''
set -euo pipefail

if [ -n "${usage_prompt:-}" ]; then
  args=(prompt --prompt "$usage_prompt")

  if [ "${usage_recreate:-false}" = "true" ]; then
    args+=(--recreate)
  fi

  if [ -n "${usage_model:-}" ]; then
    args+=(--model "$usage_model")
  fi

  if [ -n "${usage_agent:-}" ]; then
    args+=(--agent "$usage_agent")
  fi

  if [ "${usage_wait:-false}" = "true" ]; then
    args+=(--wait)
  fi
else
  if [ "${usage_recreate:-false}" = "true" ]; then
    args=(create)
  else
    args=(up)
  fi
fi


if [ -n "${usage_snapshot_id:-}" ]; then
  args+=(--snapshot-id "$usage_snapshot_id")
fi

fnox exec -- bun run ./tools/e2b/sandbox.ts "${args[@]}"
'''

[tasks.sandbox-refresh]
description = "Rebuild sandbox and snapshot from template"
run = "fnox exec -- sh -lc 'cd tools/e2b && E2B_TEMPLATE=${E2B_TEMPLATE:-doodle-sandbox} bun run sandbox.ts create'"

[tasks.sandbox-fast]
description = "Start sandbox from last snapshot only"
run = "fnox exec -- sh -lc 'cd tools/e2b && bun run sandbox.ts resume-last --no-wait'"

[tasks.sandbox-prompt]
description = "Legacy prompt runner for multiple sandboxes"
run = "fnox exec -- sh -lc 'cd tools/e2b && bun run sandbox.ts run-prompt --count ${SANDBOX_COUNT:-1}'"

[tasks.sandbox-template-build]
description = "Build E2B high-memory template"
run = "fnox exec -- sh -lc 'cd tools/e2b && bun run build-template.ts'"

[tasks.sandbox-cleanup]
description = "Cleanup E2B sandboxes (dry-run by default)"
usage = '''
flag "--hours <hours>" help="Only include sandboxes older than N hours (default 24)"
flag "--project <name>" help="Project metadata filter (default doodle)"
flag "--execute" help="Actually kill matched sandboxes"
flag "--include-running" help="Include running sandboxes"
flag "--all-projects" help="Ignore project metadata filter"
flag "--all" help="Shortcut for --all-projects + --include-running"
flag "--any-age" help="Ignore age filtering"
'''
shell = "bash -c"
run = '''
set -euo pipefail

args=()

if [ -n "${usage_hours:-}" ]; then
  args+=(--hours "$usage_hours")
fi

if [ -n "${usage_project:-}" ]; then
  args+=(--project "$usage_project")
fi

if [ "${usage_execute:-false}" = "true" ]; then
  args+=(--execute)
fi

if [ "${usage_include_running:-false}" = "true" ]; then
  args+=(--include-running)
fi

if [ "${usage_all_projects:-false}" = "true" ]; then
  args+=(--all-projects)
fi

if [ "${usage_all:-false}" = "true" ]; then
  args+=(--all)
fi

if [ "${usage_any_age:-false}" = "true" ]; then
  args+=(--any-age)
fi

fnox exec -- sh -lc 'cd tools/e2b && bun run cleanup.ts "$@"' sh "${args[@]}"
'''

[tasks.sandbox-cleanup-exec]
description = "Delete old E2B sandboxes"
run = "mise run sandbox-cleanup --execute --include-running"

[tasks.sandbox-clear-snapshot]
description = "Clear saved E2B snapshot pointer"
run = "rm -f tools/e2b/.last_snapshot_id"

[tasks.compose-bg]
description = "Start docker compose postgres"
run = "docker compose up -d postgres"
